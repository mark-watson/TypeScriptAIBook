<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ollama Chat</title>
    <meta name="description" content="A local Ollama chat client with conversation memory and session history." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <!-- Sidebar: Session History -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <h2 class="sidebar-title">Sessions</h2>
          <button id="btn-new-session" class="btn-new-session" title="New Session">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>New Chat</span>
          </button>
        </div>
        <div id="session-list" class="session-list">
          <!-- Session entries rendered dynamically -->
        </div>
        <div class="sidebar-footer">
          <div class="model-selector">
            <label for="model-select">Model</label>
            <select id="model-select">
              <option value="gemma4:12b-it-qat">gemma4:12b-it-qat</option>
              <option value="nemotron-3-nano:4b">nemotron-3-nano:4b</option>
            </select>
          </div>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main id="main" class="main">
        <!-- Chat Messages -->
        <div id="chat-messages" class="chat-messages">
          <div id="welcome-screen" class="welcome-screen">
            <div class="welcome-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/>
                <line x1="10" y1="22" x2="14" y2="22"/>
              </svg>
            </div>
            <h1 class="welcome-title">Ollama Chat</h1>
            <p class="welcome-subtitle">Start a conversation with your local LLM</p>
          </div>
        </div>

        <!-- Input Bar -->
        <div class="input-bar">
          <form id="chat-form" class="chat-form">
            <div class="input-wrapper">
              <textarea
                id="chat-input"
                class="chat-input"
                placeholder="Send a message…"
                rows="1"
                autofocus
              ></textarea>
              <button type="submit" id="btn-send" class="btn-send" title="Send message" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
              </button>
            </div>
          </form>
          <div class="input-footer">
            <span id="status-indicator" class="status-indicator">
              <span class="status-dot"></span>
              <span id="status-text">Checking Ollama…</span>
            </span>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
